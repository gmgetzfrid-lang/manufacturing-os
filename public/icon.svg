<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Manufacturing OS">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f97316"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background so the icon reads as "maskable": the glyph sits
       well inside the safe zone (centered, ~60% of the canvas). -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Dashboard / control glyph, white, centered with generous padding. -->
  <g fill="#ffffff">
    <rect x="146" y="146" width="98" height="98" rx="18"/>
    <rect x="268" y="146" width="98" height="58" rx="18"/>
    <rect x="268" y="226" width="98" height="140" rx="18"/>
    <rect x="146" y="268" width="98" height="98" rx="18"/>
  </g>
</svg>
