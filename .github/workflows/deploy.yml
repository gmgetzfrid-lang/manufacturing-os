name: Deploy

# Production deploy driven by GitHub Actions instead of Vercel's native Git
# integration. CI provably fires on pushes to master (see ci.yml runs), so this
# gives reliable deploys regardless of the Vercel<->GitHub webhook state.
#
# One-time setup — add these in GitHub → Settings → Secrets and variables →
# Actions → "New repository secret":
#   VERCEL_TOKEN       (Vercel → Account Settings → Tokens → Create)
#   VERCEL_ORG_ID      (Vercel project → Settings → General, or .vercel/project.json)
#   VERCEL_PROJECT_ID  (same place)
# Until those exist, this workflow runs and cleanly skips (stays green).

on:
  push:
    branches: [master]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::notice::VERCEL_TOKEN not set — add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID as repo secrets to enable deploys. Skipping."
            exit 0
          fi
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
